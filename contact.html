<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Hindi Pathshala</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Baloo 2', cursive; }
    html { scroll-behavior: smooth; }

    /* ── SCROLL REVEAL ── */
    .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.from-left   { transform: translateX(-60px); }
    .reveal.from-right  { transform: translateX(60px); }
    .reveal.from-bottom { transform: translateY(60px); }
    .reveal.zoom-in     { transform: scale(0.85); opacity: 0; transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.34,1.56,0.64,1); }
    .reveal.visible     { opacity: 1; transform: translateY(0) translateX(0) scale(1); }

    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }
    .reveal-delay-5 { transition-delay: 0.5s; }
    .reveal-delay-6 { transition-delay: 0.6s; }

    /* ── INFO CARD ANIMATIONS ── */
    @keyframes floatCard {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-7px); }
    }
    @keyframes glowRing {
      0%, 100% { box-shadow: 0 0 0 0    rgba(255,210,60,0.6), 0 8px 30px rgba(0,0,0,0.1); }
      50%       { box-shadow: 0 0 0 10px rgba(255,210,60,0),   0 8px 30px rgba(0,0,0,0.1); }
    }
    @keyframes shimmerSweep {
      0%   { left: -120%; }
      100% { left:  200%; }
    }
    @keyframes topBarSlide {
      from { width: 0%; }
      to   { width: 100%; }
    }
    @keyframes iconPop {
      0%, 100% { transform: scale(1); }
      40%       { transform: scale(1.35) rotate(-8deg); }
      70%       { transform: scale(0.9) rotate(5deg); }
    }
    @keyframes inputFocusGlow {
      from { box-shadow: 0 0 0 0 rgba(251,191,36,0.5); }
      to   { box-shadow: 0 0 0 5px rgba(251,191,36,0); }
    }
    @keyframes btnShine {
      0%   { left: -100%; }
      100% { left:  200%; }
    }
    @keyframes formCardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* Info contact item */
    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 18px;
      border-radius: 16px;
      background: white;
      position: relative;
      overflow: hidden;
      animation: floatCard 4s ease-in-out infinite, glowRing 2.8s ease-in-out infinite;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      cursor: default;
    }
    .info-item:nth-child(1) { animation-delay: 0s,    0s;    }
    .info-item:nth-child(2) { animation-delay: 0.4s,  0.4s;  }
    .info-item:nth-child(3) { animation-delay: 0.8s,  0.8s;  }
    .info-item:nth-child(4) { animation-delay: 1.2s,  1.2s;  }

    .info-item:hover {
      transform: translateY(-10px) scale(1.03) !important;
      animation-play-state: paused;
    }
    .info-item:hover .info-icon {
      animation: iconPop 0.5s ease forwards;
    }
    .info-item::after {
      content: '';
      position: absolute;
      top: 0; left: -120%;
      width: 55%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
      transform: skewX(-18deg);
      pointer-events: none;
    }
    .info-item:hover::after {
      animation: shimmerSweep 0.5s ease forwards;
    }
    .info-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, #f97316, #eab308);
      border-radius: 16px 16px 0 0;
    }
    .info-item.reveal.visible::before {
      animation: topBarSlide 0.7s ease forwards 0.2s;
    }

    .info-icon {
      font-size: 1.7rem;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }

    /* Form inputs focus animation */
    .form-input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 14px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
      background: white;
      font-family: 'Baloo 2', cursive;
      font-size: 1rem;
    }
    .form-input:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 4px rgba(251,191,36,0.2);
      transform: translateY(-2px);
      animation: inputFocusGlow 0.4s ease;
    }

    /* Submit button shine */
    .submit-btn {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 14px;
      background: #FFD84D;
      border-radius: 30px;
      font-weight: 800;
      font-size: 1.05rem;
      cursor: pointer;
      border: none;
      font-family: 'Baloo 2', cursive;
      transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
    }
    .submit-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-18deg);
      pointer-events: none;
    }
    .submit-btn:hover {
      background: #ffcc00;
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 25px rgba(255,200,50,0.5);
    }
    .submit-btn:hover::after {
      animation: btnShine 0.5s ease forwards;
    }
    .submit-btn:active {
      transform: scale(0.97);
    }

    /* Form card */
    .form-card {
      background: #fff9e6;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .form-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.13);
    }
    .form-card.reveal.visible {
      animation: formCardIn 0.7s cubic-bezier(0.34,1.2,0.64,1) forwards;
    }

    /* Social icon hover */
    .social-icon {
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
    }
    .social-icon:hover {
      transform: translateY(-5px) scale(1.2);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
  </style>
</head>

<body class="bg-[#f9f9f9]">

<!-- HEADER -->
<header class="flex flex-col md:flex-row justify-between items-center px-6 md:px-10 py-4 bg-yellow-400">
  <h2 class="text-2xl font-extrabold text-purple-900">हिंदी पाठशाला</h2>
  <nav class="mt-2 md:mt-0 space-x-6 font-semibold md:mx-auto text-center">
    <a href="index.html" class="hover:text-purple-900">Home</a>
    <a href="about.html" class="hover:text-purple-900">About</a>
    <a href="courses.html" class="hover:text-purple-900">Courses</a>
    <a href="contact.html" class="text-purple-900">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="text-center py-[30px] bg-[#fff4cc]">
  <h1 class="text-4xl font-extrabold text-orange-600 reveal from-bottom">Contact Us</h1>
  <p class="text-[20px] mt-[10px] reveal from-bottom reveal-delay-1">We would love to hear from you!</p>
</section>

<!-- CONTACT SECTION -->
<section class="px-6 md:px-[60px] py-[60px] bg-[#fff4cc]">
  <div class="max-w-6xl mx-auto flex justify-between gap-[50px] flex-wrap">

    <!-- LEFT: INFO -->
    <div class="flex-1 min-w-[280px]">
      <h2 class="text-[32px] font-extrabold text-purple-900 mb-6 reveal from-left">Get In Touch</h2>

      <div class="flex flex-col gap-4">

        <div class="info-item reveal from-left reveal-delay-1">
          <span class="info-icon">📞</span>
          <div>
            <p class="font-bold text-purple-900 text-sm uppercase tracking-wide">Phone</p>
            <p class="text-gray-800 font-semibold">+91 9958735101</p>
          </div>
        </div>

        <div class="info-item reveal from-left reveal-delay-2">
          <span class="info-icon">📧</span>
          <div>
            <p class="font-bold text-purple-900 text-sm uppercase tracking-wide">Email</p>
            <p class="text-gray-800 font-semibold">namita.mishra@hindipathshala.com</p>
          </div>
        </div>

        <div class="info-item reveal from-left reveal-delay-3">
          <span class="info-icon">📍</span>
          <div>
            <p class="font-bold text-purple-900 text-sm uppercase tracking-wide">Location</p>
            <p class="text-gray-800 font-semibold">New Delhi, Sultanpur, Lotus Building, 110030, India</p>
          </div>
        </div>

        <div class="info-item reveal from-left reveal-delay-4">
          <span class="info-icon">💻</span>
          <div>
            <p class="font-bold text-purple-900 text-sm uppercase tracking-wide">Classes</p>
            <p class="text-gray-800 font-semibold">Available Online</p>
          </div>
        </div>

      </div>

      <!-- Social Icons -->
      <div class="flex gap-3 mt-8 reveal from-left reveal-delay-5">
        <a href="#" target="_blank" class="social-icon w-11 h-11 flex items-center justify-center bg-white rounded-full shadow">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#E1306C" class="w-5 h-5">
            <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5zm4.25 3.5A4.5 4.5 0 1 1 7.5 12 4.5 4.5 0 0 1 12 7.5zm0 2A2.5 2.5 0 1 0 14.5 12 2.5 2.5 0 0 0 12 9.5zm4.75-.88a1.12 1.12 0 1 1-1.12-1.12 1.12 1.12 0 0 1 1.12 1.12z"/>
          </svg>
        </a>
        <a href="https://www.youtube.com/@hindi_pathsalaa" target="_blank" class="social-icon w-11 h-11 flex items-center justify-center bg-white rounded-full shadow">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#FF0000" class="w-5 h-5">
            <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.7 3.5 12 3.5 12 3.5s-7.7 0-9.4.6A3 3 0 0 0 .5 6.2 31.6 31.6 0 0 0 0 12a31.6 31.6 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.7.6 9.4.6 9.4.6s7.7 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.6 31.6 0 0 0 24 12a31.6 31.6 0 0 0-.5-5.8zM9.8 15.5v-7l6 3.5-6 3.5z"/>
          </svg>
        </a>
        <a href="#" target="_blank" class="social-icon w-11 h-11 flex items-center justify-center bg-white rounded-full shadow">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#0077B5" class="w-5 h-5">
            <path d="M4.98 3.5A2.5 2.5 0 1 0 5 8.5 2.5 2.5 0 0 0 4.98 3.5zM3 9h4v12H3zM14.5 9c-2.21 0-3.5 1.21-4 2.06V9H7v12h3.5v-6.2c0-1.64.31-3.23 2.34-3.23 2 0 2.03 1.87 2.03 3.33V21H18V14.4c0-3.2-.69-5.4-3.5-5.4z"/>
          </svg>
        </a>
        <a href="https://wa.me/919958735101?text=Hello,%20I%20Want%20to%20Know%20About%20Your%20Courses!" target="_blank" class="social-icon w-11 h-11 flex items-center justify-center bg-white rounded-full shadow">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#25D366" class="w-5 h-5">
            <path d="M20.52 3.48A11.8 11.8 0 0 0 12.01 0C5.38 0 .01 5.38 0 12c0 2.12.55 4.19 1.6 6.01L0 24l6.17-1.61A11.94 11.94 0 0 0 12 24c6.63 0 12-5.38 12-12 0-3.19-1.24-6.19-3.48-8.52zM12 21.8c-1.83 0-3.61-.49-5.16-1.42l-.37-.22-3.66.96.98-3.57-.24-.37A9.8 9.8 0 1 1 12 21.8zm5.39-7.33c-.29-.14-1.71-.84-1.97-.94-.26-.1-.45-.14-.64.14-.19.29-.74.94-.91 1.14-.17.19-.34.22-.63.07-.29-.14-1.22-.45-2.32-1.43-.86-.77-1.44-1.72-1.61-2.01-.17-.29-.02-.45.12-.59.13-.13.29-.34.43-.51.14-.17.19-.29.29-.48.1-.19.05-.36-.02-.51-.07-.14-.64-1.54-.88-2.11-.23-.55-.47-.48-.64-.49l-.55-.01c-.19 0-.51.07-.78.36-.27.29-1.03 1.01-1.03 2.46 0 1.45 1.06 2.86 1.21 3.06.14.19 2.08 3.17 5.03 4.45.7.3 1.24.48 1.67.61.7.22 1.34.19 1.85.12.56-.08 1.71-.7 1.95-1.37.24-.67.24-1.24.17-1.37-.07-.12-.26-.19-.55-.33z"/>
          </svg>
        </a>
      </div>
    </div>

    <!-- RIGHT: FORM -->
    <div class="flex-1 min-w-[280px] form-card reveal from-right">
      <h2 class="text-2xl font-extrabold text-gray-800 mb-5">Send Message</h2>

      <form id="waForm">
        <input id="name" type="text" placeholder="Your Name" required class="form-input">
        <input id="phone" type="tel" placeholder="Phone Number" required class="form-input">
        <input id="email" type="email" placeholder="Email" class="form-input">
        <input id="class" type="text" placeholder="Class (6–12)" class="form-input">

        <select id="subject" class="form-input">
          <option value="">Select Subject</option>
          <option>Hindi</option>
          <option>Sanskrit</option>
          <option>Both</option>
        </select>

        <textarea id="message" placeholder="Your Message" rows="4" class="form-input" style="resize:none;"></textarea>

        <button type="submit" class="submit-btn">
          Send on WhatsApp 💬
        </button>
      </form>
    </div>

  </div>
</section>

<script>
// ── FORM SUBMIT ────────────────────────────────────────────
document.getElementById("waForm").addEventListener("submit", function(e) {
  e.preventDefault();
  var name    = document.getElementById("name").value;
  var phone   = document.getElementById("phone").value;
  var email   = document.getElementById("email").value;
  var cls     = document.getElementById("class").value;
  var subject = document.getElementById("subject").value;
  var message = document.getElementById("message").value;

  var text =
    "Name: " + name + "\n" +
    "Phone: " + phone + "\n" +
    "Email: " + email + "\n" +
    "Class: " + cls + "\n" +
    "Subject: " + subject + "\n" +
    "Message: " + message;

  window.open("https://wa.me/919958735101?text=" + encodeURIComponent(text), "_blank");
});

// ── SCROLL REVEAL ─────────────────────────────────────────
(function () {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(function(el) { obs.observe(el); });
})();
</script>

</body>
</html>
